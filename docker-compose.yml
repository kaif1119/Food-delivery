name: food-delivery

services:
  backend:
    build: ./Backend
    ports: 
      - "3000:3000"
    volumes: 
      - ./Backend:/app
      - ./Frontend/dist:/Frontend/dist
      - Backend_node_modules:/app/node_modules
    env_file:
      - ./Backend/.env
    command: npm run dev

  frontend:
    build: ./Frontend
    ports: 
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:3000
    volumes: 
      - ./Frontend:/app
      - Frontend_node_modules:/app/node_modules
    command: npm run dev

volumes:
  Backend_node_modules:
  Frontend_node_modules:
